<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="2500" viewBox="0 0 1900 2500">
  <defs>
    <style>
      .title { font: 700 42px 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; fill: #111; }
      .subtitle { font: 400 22px 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; fill: #444; }
      .panelTitle { font: 700 30px 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; fill: #111; }
      .section { font: 700 26px 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; fill: #111; }
      .head { font: 700 24px 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; fill: #111; }
      .body { font: 400 23px 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; fill: #222; }
      .small { font: 400 20px 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; fill: #444; }
      .tiny { font: 400 18px 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; fill: #555; }
      .result { font: 700 22px 'Times New Roman','Songti SC',serif; fill: #b22222; }
      .resultSmall { font: 700 20px 'Times New Roman','Songti SC',serif; fill: #b22222; }
      .resultNote { font: 400 19px 'Songti SC','STSong',serif; fill: #b22222; }
      .confirm { font: 700 24px 'Songti SC','STSong',serif; fill: #006400; }
      .panel { fill: #fcfcfc; stroke: #111; stroke-width: 2.4; }
      .box { fill: #fff; stroke: #111; stroke-width: 2; }
      .soft { fill: #f3f3f3; stroke: #222; stroke-width: 1.8; }
      .highlight { fill: #e8e8e8; stroke: #111; stroke-width: 2.6; }
      .resultBox { fill: #fff8f0; stroke: #b22222; stroke-width: 2.4; }
      .confirmBox { fill: #f0fff0; stroke: #006400; stroke-width: 2.4; }
      .ivBox { fill: #f0f4ff; stroke: #1a3a8a; stroke-width: 2.4; }
      .ivText { font: 700 22px 'Times New Roman','Songti SC',serif; fill: #1a3a8a; }
      .ivSmall { font: 400 20px 'Songti SC','STSong',serif; fill: #1a3a8a; }
      .line { fill: none; stroke: #111; stroke-width: 2.4; }
      .dash { fill: none; stroke: #888; stroke-width: 2; stroke-dasharray: 10 8; }
      .rule { fill: none; stroke: #555; stroke-width: 1.6; }
      .arrowLine { fill: none; stroke: #111; stroke-width: 2.8; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#111"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#b22222"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1a3a8a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1900" height="2500" fill="#ffffff"/>

  <!-- ===== Title ===== -->
  <text x="950" y="52" text-anchor="middle" class="title">数据要素利用与资本定价效率：研究框架</text>
  <text x="950" y="86" text-anchor="middle" class="subtitle">面板回归 + IV因果识别 + 机制检验 + 投资组合回测 | 2011-2024 沪深A股 N=38,614</text>

  <!-- ===== Panel A: Theory ===== -->
  <rect x="40" y="110" width="1820" height="400" rx="10" class="panel"/>
  <text x="78" y="150" class="panelTitle">Panel A  理论分析与假说</text>
  <line x1="60" y1="164" x2="1840" y2="164" class="rule"/>

  <!-- Core premise -->
  <rect x="80" y="182" width="1740" height="55" rx="8" class="highlight"/>
  <text x="950" y="218" text-anchor="middle" class="head">核心前提：企业真实价值 = 传统资产价值 + 数据资产价值（会计度量存在系统性偏差）</text>

  <!-- Two competing effects -->
  <rect x="80" y="260" width="820" height="110" rx="10" class="box"/>
  <text x="490" y="294" text-anchor="middle" class="section">信息模糊效应（抑制定价效率）</text>
  <line x1="105" y1="306" x2="875" y2="306" class="rule"/>
  <text x="105" y="334" class="small">会计度量失真：成本法低估数据资产增值能力</text>
  <text x="105" y="358" class="small">商业模式复杂性高，分析师理解与估值困难</text>

  <rect x="1000" y="260" width="820" height="110" rx="10" class="box"/>
  <text x="1410" y="294" text-anchor="middle" class="section">信息供给效应（促进定价效率）</text>
  <line x1="1025" y1="306" x2="1795" y2="306" class="rule"/>
  <text x="1025" y="334" class="small">年报数据利用信息降低投资者推断难度</text>
  <text x="1025" y="358" class="small">吸引分析师覆盖，信息中介加速信息传导</text>

  <text x="940" y="330" text-anchor="middle" class="section">VS</text>

  <!-- Hypotheses -->
  <rect x="80" y="395" width="540" height="100" rx="8" class="confirmBox"/>
  <text x="350" y="426" text-anchor="middle" class="head">H1  主效应（竞争性假说）</text>
  <text x="105" y="454" class="small">H1a 信息供给占主导 → 降低PriceDelay</text>
  <text x="105" y="478" class="small">H1b 信息模糊占主导 → 提升PriceDelay</text>
  <text x="545" y="478" class="confirm">H1a ✓</text>

  <rect x="680" y="395" width="540" height="100" rx="8" class="confirmBox"/>
  <text x="950" y="426" text-anchor="middle" class="head">H2  机制渠道</text>
  <text x="705" y="454" class="small">分析师覆盖 / 金融资产配置 / 机构持股</text>
  <text x="705" y="478" class="small">信息环境改善的多渠道传导</text>
  <text x="1145" y="478" class="confirm">✓</text>

  <rect x="1280" y="395" width="540" height="100" rx="8" class="confirmBox"/>
  <text x="1550" y="426" text-anchor="middle" class="head">H3  因果识别</text>
  <text x="1305" y="454" class="small">DU_kw → PriceDelay 因果关系</text>
  <text x="1305" y="478" class="small">IV + Oster bounds 双重确认</text>
  <text x="1745" y="478" class="confirm">✓</text>

  <!-- ===== Arrow A→B ===== -->
  <line x1="950" y1="510" x2="950" y2="545" class="arrowLine" marker-end="url(#arrow)"/>

  <!-- ===== Panel B: Research Design ===== -->
  <rect x="40" y="555" width="1820" height="270" rx="10" class="panel"/>
  <text x="78" y="595" class="panelTitle">Panel B  研究设计</text>
  <line x1="60" y1="609" x2="1840" y2="609" class="rule"/>

  <!-- IV box -->
  <rect x="80" y="628" width="340" height="120" rx="10" class="ivBox"/>
  <text x="250" y="660" text-anchor="middle" class="head" style="fill:#1a3a8a">IV 工具变量</text>
  <line x1="105" y1="672" x2="395" y2="672" style="stroke:#1a3a8a;stroke-width:1.4"/>
  <text x="105" y="696" class="ivSmall">Toi_s(2016) × (year-2016)</text>
  <text x="105" y="720" class="ivSmall">前定省级数字基础设施变异</text>
  <text x="105" y="740" class="tiny" style="fill:#1a3a8a">替代: Coi_s(商用) / Goi_s(政用)</text>

  <!-- Arrow IV → X -->
  <line x1="420" y1="688" x2="480" y2="688" style="fill:none;stroke:#1a3a8a;stroke-width:2.8" marker-end="url(#arrowBlue)"/>

  <!-- X box -->
  <rect x="490" y="628" width="340" height="120" rx="10" class="box"/>
  <text x="660" y="660" text-anchor="middle" class="section">X  数据要素利用</text>
  <line x1="515" y1="672" x2="805" y2="672" class="rule"/>
  <text x="515" y="696" class="small">DU_kw: 5维度关键词频率/万字</text>
  <text x="515" y="720" class="small">使用 t-1 年年报数据</text>
  <text x="515" y="740" class="tiny">替换: DU_kw_ln / DU_sub_ln / DU_ratio</text>

  <!-- Arrow X → M -->
  <line x1="830" y1="688" x2="900" y2="688" class="arrowLine" marker-end="url(#arrow)"/>

  <!-- M box -->
  <rect x="910" y="628" width="340" height="120" rx="10" class="box"/>
  <text x="1080" y="660" text-anchor="middle" class="section">M  机制变量</text>
  <line x1="935" y1="672" x2="1225" y2="672" class="rule"/>
  <text x="935" y="696" class="small">Analyst: 分析师覆盖</text>
  <text x="935" y="720" class="small">FinAsset: 金融资产占比</text>
  <text x="935" y="740" class="small">InstHold: 机构持股比例</text>

  <!-- Arrow M → Y -->
  <line x1="1250" y1="688" x2="1320" y2="688" class="arrowLine" marker-end="url(#arrow)"/>

  <!-- Y box -->
  <rect x="1330" y="628" width="500" height="120" rx="10" class="box"/>
  <text x="1580" y="660" text-anchor="middle" class="section">Y  资本定价效率</text>
  <line x1="1355" y1="672" x2="1805" y2="672" class="rule"/>
  <text x="1355" y="696" class="small">PriceDelay: Hou-Moskowitz (2005) 股价延迟</text>
  <text x="1355" y="720" class="small">稳健性: SYNCH 股价同步性</text>
  <text x="1355" y="740" class="tiny">FE: 企业+年份 | 聚类: 行业×年份 | Winsorize 1%/99%</text>

  <!-- Exclusion restriction note -->
  <path d="M 250,748 L 250,790 L 1580,790 L 1580,748" class="dash"/>
  <text x="915" y="810" text-anchor="middle" class="tiny" style="fill:#888">排他性: IV仅通过DU_kw影响PriceDelay（Firm FE吸收省份时不变效应）</text>

  <!-- ===== Arrow B→C ===== -->
  <line x1="950" y1="825" x2="950" y2="860" class="arrowLine" marker-end="url(#arrow)"/>

  <!-- ===== Panel C: Main Empirical Results ===== -->
  <rect x="40" y="870" width="1820" height="540" rx="10" class="panel"/>
  <text x="78" y="910" class="panelTitle">Panel C  核心实证结果</text>
  <line x1="60" y1="924" x2="1840" y2="924" class="rule"/>

  <!-- Left: Baseline -->
  <rect x="80" y="940" width="850" height="130" rx="8" class="resultBox"/>
  <text x="130" y="972" class="head">基准回归（Firm + Year FE, N = 38,614）</text>
  <text x="130" y="1002" class="result">DU_kw: β = -0.00364, t = -2.57**</text>
  <text x="130" y="1032" class="resultNote">经济意义: 1 std ↑ → PriceDelay ↓ 5.6%</text>
  <text x="130" y="1058" class="tiny">6个模型（3种自变量 × 2种FE）方向完全一致，均在5%以上显著</text>

  <!-- Right: 2SLS -->
  <rect x="960" y="940" width="870" height="130" rx="8" class="ivBox"/>
  <text x="1010" y="972" class="head" style="fill:#1a3a8a">2SLS 工具变量估计（N = 38,598）</text>
  <text x="1010" y="1002" class="ivText">IV1(Toi_s): β = -0.045***, t = -2.76, F = 92.2</text>
  <text x="1010" y="1028" class="ivSmall">Coi_s(商用): β=-0.066***, F=59.8 | Goi_s(政用): β=-0.034**, F=97.6</text>
  <text x="1010" y="1058" class="tiny" style="fill:#1a3a8a">三口径一致全显著 | 12.2x放大 = 测量误差衰减偏误修正 | Hansen J拒绝IV2→仅用IV1</text>

  <!-- Left bottom: Oster -->
  <rect x="80" y="1090" width="420" height="130" rx="8" class="confirmBox"/>
  <text x="290" y="1120" text-anchor="middle" class="head">Oster (2019) Bounds</text>
  <line x1="105" y1="1132" x2="475" y2="1132" class="rule"/>
  <text x="130" y="1158" class="resultSmall">Firm+Year FE: δ* = 9.03</text>
  <text x="130" y="1184" class="resultSmall">Firm+Ind×Year: δ* = 3.65</text>
  <text x="130" y="1208" class="tiny">δ*>1 即稳健；遗漏变量需9倍于控制变量才能推翻结果</text>

  <!-- Right bottom: Stress tests -->
  <rect x="530" y="1090" width="1300" height="130" rx="8" class="soft"/>
  <text x="1180" y="1120" text-anchor="middle" class="head">排他性压力测试</text>
  <line x1="555" y1="1132" x2="1805" y2="1132" class="rule"/>
  <text x="580" y="1158" class="resultSmall">✓ Reduced-form: IV1直接影响PriceDelay (t=-2.56**), implied IV与2SLS一致</text>
  <text x="580" y="1182" class="resultSmall">✓ Pre-period: 2016年前 F=2.7(弱), RF t=0.05(零) — IV在前定期无效，支持识别故事</text>
  <text x="580" y="1206" class="small">⚠ Lead placebo: 因DU_kw持久性，条件检验中lag系数2.2x>lead | ⚠ 省级控制: 可能bad controls (中介)</text>

  <!-- Heterogeneity strip -->
  <rect x="80" y="1240" width="1750" height="150" rx="8" class="soft"/>
  <text x="130" y="1272" class="head">异质性分析（4维度全部显著）</text>
  <line x1="105" y1="1286" x2="1805" y2="1286" class="rule"/>

  <text x="130" y="1314" class="resultSmall">小企业 t=-4.94*** vs 大企业 t=-3.61***</text>
  <text x="130" y="1340" class="small">信息不对称更严重 → 数据利用信息改善边际效应更大</text>

  <text x="560" y="1314" class="resultSmall">高分析师覆盖 t=-5.60*** vs 低覆盖 t=-2.56**</text>
  <text x="560" y="1340" class="small">分析师中介放大数据利用的定价改善（与机制一致）</text>

  <text x="1060" y="1314" class="resultSmall">国企 t=-4.00*** vs 民企 t=-3.86***</text>
  <text x="1060" y="1340" class="small">国企披露更规范 | 高科技 vs 传统行业均显著</text>

  <text x="130" y="1378" class="tiny">所有模型: Firm+Year FE, IndYear聚类, 15个控制变量</text>

  <!-- ===== Arrow C→D ===== -->
  <line x1="950" y1="1410" x2="950" y2="1445" class="arrowLine" marker-end="url(#arrow)"/>

  <!-- ===== Panel D: Mechanism ===== -->
  <rect x="40" y="1455" width="1820" height="230" rx="10" class="panel"/>
  <text x="78" y="1495" class="panelTitle">Panel D  机制检验</text>
  <line x1="60" y1="1509" x2="1840" y2="1509" class="rule"/>

  <text x="80" y="1535" class="small">所有模型控制15个基准控制变量，Firm+Year FE，IndYear聚类，DU_kw使用t-1年数据</text>

  <!-- Analyst -->
  <rect x="80" y="1552" width="540" height="115" rx="10" class="resultBox"/>
  <text x="350" y="1582" text-anchor="middle" class="head">渠道一：分析师覆盖</text>
  <line x1="105" y1="1594" x2="595" y2="1594" class="rule"/>
  <text x="130" y="1618" class="result">DU_kw → Analyst: t = 2.63***</text>
  <text x="130" y="1644" class="small">数据利用 → 吸引分析师 → 研报加速信息传导</text>
  <text x="130" y="1662" class="tiny">信息供给效应最直接的微观基础</text>

  <!-- FinAsset -->
  <rect x="680" y="1552" width="540" height="115" rx="10" class="resultBox"/>
  <text x="950" y="1582" text-anchor="middle" class="head">渠道二：金融资产配置</text>
  <line x1="705" y1="1594" x2="1195" y2="1594" class="rule"/>
  <text x="730" y="1618" class="result">DU_kw → FinAsset: t = 2.65***</text>
  <text x="730" y="1644" class="small">数据利用 → 资金运用效率提升 → 配置灵活性增强</text>
  <text x="730" y="1662" class="tiny">与朱康(2025)形成对话：样本期/变量定义差异</text>

  <!-- InstHold -->
  <rect x="1280" y="1552" width="540" height="115" rx="10" class="resultBox"/>
  <text x="1550" y="1582" text-anchor="middle" class="head">渠道三：机构持股</text>
  <line x1="1305" y1="1594" x2="1795" y2="1594" class="rule"/>
  <text x="1330" y="1618" class="result">DU_kw → InstHold: t = -3.19***</text>
  <text x="1330" y="1644" class="small">部分机构回避信息复杂度高的数据企业</text>
  <text x="1330" y="1662" class="tiny">分析师补偿效应更强，整体定价效率仍提升</text>

  <!-- ===== Arrow D→E ===== -->
  <line x1="950" y1="1685" x2="950" y2="1720" class="arrowLine" marker-end="url(#arrow)"/>

  <!-- ===== Panel E: Portfolio & Robustness ===== -->
  <rect x="40" y="1730" width="1820" height="300" rx="10" class="panel"/>
  <text x="78" y="1770" class="panelTitle">Panel E  投资组合回测与稳健性</text>
  <line x1="60" y1="1784" x2="1840" y2="1784" class="rule"/>

  <!-- Portfolio left -->
  <rect x="80" y="1800" width="860" height="210" rx="10" class="box"/>
  <text x="510" y="1832" text-anchor="middle" class="section">投资组合回测（156个月）</text>
  <line x1="105" y1="1844" x2="915" y2="1844" class="rule"/>

  <rect x="105" y="1858" width="810" height="60" rx="6" class="resultBox"/>
  <text x="130" y="1882" class="resultSmall">Q1（低数据组）FF3 alpha = -0.28%, t = -2.08**</text>
  <text x="130" y="1906" class="resultNote">低数据利用企业被市场系统性高估</text>

  <rect x="105" y="1928" width="810" height="60" rx="6" class="resultBox"/>
  <text x="130" y="1952" class="result">入表后（2024-）DAT alpha = +2.08%, t = 2.24**</text>
  <text x="130" y="1976" class="resultNote">入表新规使数据利用差异更可见，市场开始区分定价</text>

  <text x="130" y="2002" class="tiny">GRS检验: F=1.44, p=0.213（不拒绝）| DAT全样本: t=1.17 (n.s.) → 定位为补充证据</text>

  <!-- Robustness right -->
  <rect x="980" y="1800" width="850" height="210" rx="10" class="box"/>
  <text x="1405" y="1832" text-anchor="middle" class="section">稳健性检验</text>
  <line x1="1005" y1="1844" x2="1805" y2="1844" class="rule"/>

  <rect x="1005" y="1858" width="250" height="130" rx="6" class="confirmBox"/>
  <text x="1130" y="1885" text-anchor="middle" class="body">替换DV/IV</text>
  <text x="1130" y="1915" text-anchor="middle" class="small">SYNCH: t=1.79*</text>
  <text x="1130" y="1940" text-anchor="middle" class="small">DU_kw_ln: t=-3.13***</text>
  <text x="1130" y="1965" text-anchor="middle" class="small">DU_sub_ln: t=-2.64***</text>
  <text x="1130" y="1982" text-anchor="middle" class="confirm">✓</text>

  <rect x="1275" y="1858" width="250" height="130" rx="6" class="confirmBox"/>
  <text x="1400" y="1885" text-anchor="middle" class="body">PSM匹配</text>
  <text x="1400" y="1915" text-anchor="middle" class="small">1:1最近邻 cal=0.05</text>
  <text x="1400" y="1940" text-anchor="middle" class="small">t=-3.99***</text>
  <text x="1400" y="1965" text-anchor="middle" class="small">14/14变量平衡</text>
  <text x="1400" y="1982" text-anchor="middle" class="confirm">✓</text>

  <rect x="1545" y="1858" width="260" height="130" rx="6" class="confirmBox"/>
  <text x="1675" y="1885" text-anchor="middle" class="body">子样本</text>
  <text x="1675" y="1915" text-anchor="middle" class="small">剔除2024: 效应增强</text>
  <text x="1675" y="1940" text-anchor="middle" class="small">仅主板: 仍显著</text>
  <text x="1675" y="1965" text-anchor="middle" class="small">Ind+Year FE: 1%显著</text>
  <text x="1675" y="1982" text-anchor="middle" class="confirm">✓</text>

  <text x="1005" y="2002" class="tiny">DID/事件研究因前趋势违反移至附录 | 安慰剂检验（2020/2021/2022虚假政策年）均不显著 ✓</text>

  <!-- ===== Arrow E→F ===== -->
  <line x1="950" y1="2030" x2="950" y2="2065" class="arrowLine" marker-end="url(#arrow)"/>

  <!-- ===== Panel F: Contributions ===== -->
  <rect x="40" y="2075" width="1820" height="310" rx="10" class="panel"/>
  <text x="78" y="2115" class="panelTitle">Panel F  研究贡献与启示</text>
  <line x1="60" y1="2129" x2="1840" y2="2129" class="rule"/>

  <rect x="80" y="2147" width="560" height="210" rx="8" class="box"/>
  <text x="360" y="2180" text-anchor="middle" class="head">理论贡献</text>
  <line x1="105" y1="2195" x2="615" y2="2195" class="rule"/>
  <text x="105" y="2220" class="small">信息供给 > 信息模糊的实证判定</text>
  <text x="105" y="2246" class="small">分析师"翻译"功能: 信息中介加工复杂信息</text>
