<rect x="590" y="622" width="165" height="105" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
<text x="673" y="642" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">消融实验</text>
