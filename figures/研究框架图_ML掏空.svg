<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1060" font-family="'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#f0f4f8"/><stop offset="100%" stop-color="#e2e8f0"/>
  </linearGradient>
  <linearGradient id="gBlue" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1e40af"/>
  </linearGradient>
  <linearGradient id="gRed" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#b91c1c"/>
  </linearGradient>
  <linearGradient id="gGreen" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#047857"/>
  </linearGradient>
  <linearGradient id="gPurple" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#6d28d9"/>
  </linearGradient>
  <linearGradient id="gOrange" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/>
  </linearGradient>
  <linearGradient id="gIndigo" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4338ca"/>
  </linearGradient>
  <linearGradient id="gTeal" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#14b8a6"/><stop offset="100%" stop-color="#0d9488"/>
  </linearGradient>
  <filter id="sh"><feDropShadow dx="1.5" dy="2.5" stdDeviation="3.5" flood-color="#00000018"/></filter>
  <filter id="shL"><feDropShadow dx="1" dy="1.5" stdDeviation="2" flood-color="#00000012"/></filter>
  <marker id="aDown" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto"><polygon points="0 0,8 0,4 6" fill="#64748b"/></marker>
  <marker id="aRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#64748b"/></marker>
  <marker id="aGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#10b981"/></marker>
  <marker id="aPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b5cf6"/></marker>
</defs>

<!-- 背景 -->
<rect width="1280" height="1060" fill="url(#bg)" rx="12"/>

<!-- ═══════ 标题 ═══════ -->
<text x="640" y="42" text-anchor="middle" font-size="21" font-weight="bold" fill="#1e293b">数据要素利用与大股东掏空行为：基于可解释机器学习的预测与识别</text>
<text x="640" y="66" text-anchor="middle" font-size="12.5" fill="#64748b">Data Element Utilization and Controlling Shareholder Tunneling: Prediction and Identification via Explainable Machine Learning</text>

<!-- ═══════ 阶段一：多源特征工程 ═══════ -->
<rect x="30" y="88" width="1220" height="195" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
<rect x="30" y="88" width="1220" height="32" rx="10" fill="url(#gBlue)"/>
<rect x="30" y="110" width="1220" height="10" fill="url(#gBlue)"/>
<text x="640" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">阶段一：多源特征工程（Feature Engineering）</text>

<!-- 四个特征卡片 -->
<!-- 卡1: NLP数据要素特征 -->
<rect x="50" y="132" width="270" height="138" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" filter="url(#shL)"/>
<rect x="50" y="132" width="270" height="28" rx="8" fill="#3b82f6"/>
<rect x="50" y="152" width="270" height="8" fill="#3b82f6"/>
<text x="185" y="152" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#fff">NLP特征（年报文本提取）</text>
<text x="64" y="178" font-size="10.5" fill="#1e40af" font-weight="bold">数据要素利用强度 Lnda</text>
<text x="64" y="194" font-size="10" fill="#475569">Word2Vec + MD&amp;A语义相似度</text>
<text x="64" y="210" font-size="10.5" fill="#1e40af" font-weight="bold">信息披露文本质量</text>
<text x="64" y="226" font-size="10" fill="#475569">可读性 · 模糊语言占比 · 语气操纵</text>
<text x="64" y="242" font-size="10.5" fill="#1e40af" font-weight="bold">关联交易叙述特征</text>
<text x="64" y="258" font-size="10" fill="#475569">关联交易披露详细度 · 异常表述</text>

<!-- 卡2: 财务特征 -->
<rect x="340" y="132" width="270" height="138" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1" filter="url(#shL)"/>
<rect x="340" y="132" width="270" height="28" rx="8" fill="#ef4444"/>
<rect x="340" y="152" width="270" height="8" fill="#ef4444"/>
<text x="475" y="152" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#fff">财务特征（CSMAR报表）</text>
<text x="354" y="178" font-size="10" fill="#475569">其他应收款/总资产（OREC）</text>
<text x="354" y="194" font-size="10" fill="#475569">关联交易总额/总资产</text>
<text x="354" y="210" font-size="10" fill="#475569">关联担保金额/净资产</text>
<text x="354" y="226" font-size="10" fill="#475569">ROA · 资产负债率 · 营收增长率</text>
<text x="354" y="242" font-size="10" fill="#475569">经营现金流 · 应计项目 · Tobin's Q</text>
<text x="354" y="258" font-size="10" fill="#94a3b8" style="font-style:italic">~15个特征</text>

<!-- 卡3: 治理特征 -->
<rect x="630" y="132" width="270" height="138" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1" filter="url(#shL)"/>
<rect x="630" y="132" width="270" height="28" rx="8" fill="#10b981"/>
<rect x="630" y="152" width="270" height="8" fill="#10b981"/>
<text x="765" y="152" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#fff">治理特征（CSMAR治理库）</text>
<text x="644" y="178" font-size="10" fill="#475569">第一大股东持股比例</text>
<text x="644" y="194" font-size="10" fill="#475569">控制权-现金流权分离度（Wedge）</text>
<text x="644" y="210" font-size="10" fill="#475569">股权制衡度（第2-5 / 第1）</text>
<text x="644" y="226" font-size="10" fill="#475569">独董比例 · 两职合一 · 董事会规模</text>
<text x="644" y="242" font-size="10" fill="#475569">机构持股 · 审计质量 · 分析师关注</text>
<text x="644" y="258" font-size="10" fill="#94a3b8" style="font-style:italic">~12个特征</text>

<!-- 卡4: 区域特征 -->
<rect x="920" y="132" width="310" height="138" rx="8" fill="#fefce8" stroke="#fef08a" stroke-width="1" filter="url(#shL)"/>
<rect x="920" y="132" width="310" height="28" rx="8" fill="#f59e0b"/>
<rect x="920" y="152" width="310" height="8" fill="#f59e0b"/>
<text x="1075" y="152" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#fff">区域特征（遥感+公开数据）</text>
<text x="934" y="178" font-size="10" fill="#475569">NPP-VIIRS夜间灯光辐射值</text>
<text x="934" y="194" font-size="10" fill="#475569">北大数字普惠金融指数</text>
<text x="934" y="210" font-size="10" fill="#475569">数据交易所设立（0/1）</text>
<text x="934" y="226" font-size="10" fill="#475569">城市互联网普及率</text>
<text x="934" y="242" font-size="10" fill="#475569">市场化指数（樊纲）</text>
<text x="934" y="258" font-size="10" fill="#94a3b8" style="font-style:italic">~5个特征 | 数据来源：EOG · 北大 · 手工</text>

<!-- 特征总计 -->
<text x="640" y="284" text-anchor="middle" font-size="10" fill="#94a3b8">合计约 40-50 个特征 → 输入机器学习模型</text>

<!-- 向下箭头 -->
<line x1="640" y1="288" x2="640" y2="316" stroke="#64748b" stroke-width="2" marker-end="url(#aDown)"/>

<!-- ═══════ 阶段二：预测目标（Y标签） ═══════ -->
<rect x="340" y="318" width="600" height="82" rx="10" fill="#fff" stroke="#ef4444" stroke-width="1.5" filter="url(#sh)"/>
<rect x="340" y="318" width="600" height="30" rx="10" fill="url(#gRed)"/>
<rect x="340" y="340" width="600" height="8" fill="url(#gRed)"/>
<text x="640" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">预测目标 Y：大股东掏空（Tunneling）</text>

<text x="360" y="370" font-size="10.5" fill="#334155" font-weight="bold">主标签：</text>
<text x="416" y="370" font-size="10.5" fill="#475569">OREC &gt; 行业-年度中位数 → Y=1（高掏空风险）</text>
<text x="360" y="388" font-size="10.5" fill="#334155" font-weight="bold">稳健标签：</text>
<text x="432" y="388" font-size="10.5" fill="#475569">CSRC处罚（资金占用/关联违规）→ Y=1  |  异常OREC残差法 → Y=1</text>

<!-- 向下箭头 -->
<line x1="640" y1="400" x2="640" y2="426" stroke="#64748b" stroke-width="2" marker-end="url(#aDown)"/>

<!-- ═══════ 阶段三：模型训练与对比 ═══════ -->
<rect x="150" y="428" width="980" height="120" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#sh)"/>
<rect x="150" y="428" width="980" height="30" rx="10" fill="url(#gPurple)"/>
<rect x="150" y="450" width="980" height="8" fill="url(#gPurple)"/>
<text x="640" y="450" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">阶段三：模型训练与性能对比</text>

<!-- 4个模型卡片 -->
<rect x="175" y="470" width="185" height="62" rx="6" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
<text x="268" y="490" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">Logistic Regression</text>
<text x="268" y="506" text-anchor="middle" font-size="10" fill="#7c3aed">基线模型（Baseline）</text>
<text x="268" y="522" text-anchor="middle" font-size="9" fill="#a78bfa">传统方法对照组</text>

<rect x="385" y="470" width="185" height="62" rx="6" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
<text x="478" y="490" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">Random Forest</text>
<text x="478" y="506" text-anchor="middle" font-size="10" fill="#7c3aed">集成学习（Bagging）</text>
<text x="478" y="522" text-anchor="middle" font-size="9" fill="#a78bfa">特征重要性基准</text>

<rect x="595" y="470" width="185" height="62" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="688" y="490" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">XGBoost / LightGBM</text>
<text x="688" y="506" text-anchor="middle" font-size="10" fill="#7c3aed">集成学习（Boosting）</text>
<text x="688" y="522" text-anchor="middle" font-size="9" fill="#6d28d9" font-weight="bold">预期最优模型 ★</text>

<rect x="805" y="470" width="185" height="62" rx="6" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
<text x="898" y="490" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">MLP / Neural Net</text>
<text x="898" y="506" text-anchor="middle" font-size="10" fill="#7c3aed">深度学习（可选）</text>
<text x="898" y="522" text-anchor="middle" font-size="9" fill="#a78bfa">非线性边界探索</text>

<!-- 验证策略 -->
<text x="1020" y="470" font-size="9" fill="#6d28d9" font-weight="bold">验证策略</text>
<text x="1020" y="484" font-size="9" fill="#7c3aed">时间序列分割</text>
<text x="1020" y="496" font-size="9" fill="#7c3aed">2015-19训练</text>
<text x="1020" y="508" font-size="9" fill="#7c3aed">2020-23测试</text>
<text x="1020" y="524" font-size="9" fill="#6d28d9" font-weight="bold">AUC · F1 · PR</text>

<!-- 向下箭头 -->
<line x1="640" y1="548" x2="640" y2="576" stroke="#64748b" stroke-width="2" marker-end="url(#aDown)"/>

<!-- 核心发现标注 -->
<rect x="430" y="556" width="420" height="20" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
<text x="640" y="570" text-anchor="middle" font-size="10" fill="#92400e" font-weight="bold">核心发现：加入数据要素NLP特征后 AUC 显著提升 → 增量预测力</text>

