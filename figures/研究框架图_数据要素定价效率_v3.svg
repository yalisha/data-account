<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="2680" viewBox="0 0 1900 2680">
  <defs>
    <style>
      .title { font: 700 44px 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; fill: #111; }
      .subtitle { font: 400 23px 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; fill: #333; }
      .panelTitle { font: 700 32px 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; fill: #111; }
      .section { font: 700 28px 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; fill: #111; }
      .head { font: 700 26px 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; fill: #111; }
      .body { font: 400 24px 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; fill: #222; }
      .small { font: 400 21px 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; fill: #444; }
      .tiny { font: 400 19px 'Songti SC','STSong','Noto Serif CJK SC','SimSun',serif; fill: #555; }
      .eq { font: 400 23px 'Times New Roman','Songti SC','STSong',serif; fill: #111; }
      .panel { fill: #fcfcfc; stroke: #111; stroke-width: 2.4; }
      .box { fill: #fff; stroke: #111; stroke-width: 2.2; }
      .soft { fill: #f3f3f3; stroke: #222; stroke-width: 2; }
      .accent { fill: #eaeaea; stroke: #111; stroke-width: 2.2; }
      .highlight { fill: #e8e8e8; stroke: #111; stroke-width: 2.6; }
      .line { fill: none; stroke: #111; stroke-width: 2.6; }
      .dash { fill: none; stroke: #333; stroke-width: 2.2; stroke-dasharray: 10 8; }
      .rule { fill: none; stroke: #555; stroke-width: 1.8; }
      .thick { fill: none; stroke: #111; stroke-width: 3.2; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#111"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#333"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1900" height="2680" fill="#ffffff"/>

  <!-- Title -->
  <text x="950" y="58" text-anchor="middle" class="title">数据要素利用、资产配置与资本定价效率</text>
  <text x="950" y="94" text-anchor="middle" class="subtitle">理论分析 + 面板回归 + 投资组合回测 + 因果发现（进一步分析）</text>

  <!-- ============ Panel A: 理论分析与假说 ============ -->
  <rect x="40" y="122" width="1820" height="580" rx="10" class="panel"/>
  <text x="78" y="164" class="panelTitle">Panel A. 理论分析与假说推导</text>
  <line x1="60" y1="178" x2="1840" y2="178" class="rule"/>

  <!-- 核心前提 -->
  <rect x="80" y="200" width="1740" height="78" rx="8" class="highlight"/>
  <text x="950" y="234" text-anchor="middle" class="head">核心前提：企业真实价值 = 传统资产价值 + 数据资产价值</text>
  <text x="950" y="264" text-anchor="middle" class="small">传统资产可由报表准确反映；数据资产受限于会计体系（成本法低估增值能力），存在系统性度量偏差</text>

  <!-- 信息模糊效应 -->
  <rect x="80" y="305" width="840" height="200" rx="10" class="box"/>
  <text x="500" y="345" text-anchor="middle" class="section">效应一：信息模糊效应（抑制定价效率）</text>
  <line x1="105" y1="358" x2="895" y2="358" class="rule"/>
  <text x="105" y="393" class="head">子渠道a：会计度量失真</text>
  <text x="105" y="425" class="small">数据资产仅以成本法入表，市场缺乏评估内在增值能力的锚点</text>
  <text x="105" y="460" class="head">子渠道b：分析师理解困难</text>
  <text x="105" y="492" class="small">数据驱动的商业模式复杂，传统行业分析框架难以覆盖</text>

  <!-- 信息供给效应 -->
  <rect x="980" y="305" width="840" height="200" rx="10" class="box"/>
  <text x="1400" y="345" text-anchor="middle" class="section">效应二：信息供给效应（促进定价效率）</text>
  <line x1="1005" y1="358" x2="1795" y2="358" class="rule"/>
  <text x="1005" y="393" class="head">子渠道a：主动披露增加</text>
  <text x="1005" y="425" class="small">年报中数据相关经营信息更丰富，降低投资者推断难度</text>
  <text x="1005" y="460" class="head">子渠道b：外部关注提升</text>
  <text x="1005" y="492" class="small">吸引分析师覆盖和机构投资者关注，信息中介作用增强</text>

  <!-- VS -->
  <text x="950" y="410" text-anchor="middle" class="section">VS</text>

  <!-- Hypotheses -->
  <rect x="80" y="535" width="540" height="140" rx="8" class="soft"/>
  <text x="350" y="572" text-anchor="middle" class="head">H1 主效应（竞争性假说）</text>
  <text x="105" y="605" class="small">H1a：信息供给效应占主导 → 提升定价效率</text>
  <text x="105" y="635" class="small">H1b：信息模糊效应占主导 → 降低定价效率</text>
  <text x="105" y="660" class="tiny">净效应方向为实证问题</text>

  <rect x="680" y="535" width="540" height="140" rx="8" class="soft"/>
  <text x="950" y="572" text-anchor="middle" class="head">H2 资产配置渠道</text>
  <text x="705" y="605" class="small">H2a：脱虚向实，金融资产占比下降</text>
  <text x="705" y="635" class="small">H2b：数据资产占比上升，改变可观测/</text>
  <text x="705" y="660" class="small">不可观测价值构成比例</text>

  <rect x="1280" y="535" width="540" height="140" rx="8" class="soft"/>
  <text x="1550" y="572" text-anchor="middle" class="head">H3 制度调节</text>
  <text x="1305" y="605" class="small">2024入表新规提供会计锚点</text>
  <text x="1305" y="635" class="small">削弱信息模糊效应（会计度量失真渠道）</text>
  <text x="1305" y="660" class="small">使信息供给效应更充分释放</text>

  <!-- ============ Panel B: 变量度量 ============ -->
  <rect x="40" y="730" width="1820" height="310" rx="10" class="panel"/>
  <text x="78" y="772" class="panelTitle">Panel B. 核心变量度量：分阶段双重确认策略</text>
  <line x1="60" y1="786" x2="1840" y2="786" class="rule"/>

  <!-- X: 自变量 -->
  <rect x="80" y="806" width="560" height="210" rx="10" class="box"/>
  <text x="360" y="842" text-anchor="middle" class="section">自变量：数据要素利用</text>
  <line x1="105" y1="856" x2="615" y2="856" class="rule"/>
  <text x="105" y="890" class="head">主指标：LLM年报语义评分</text>
  <text x="105" y="920" class="small">语义理解上下文，区分实质利用 vs 概念提及</text>
  <text x="105" y="952" class="head">硬指标交叉验证（2024年后）</text>
  <text x="105" y="982" class="small">数据资源入表金额 / 开发支出资本化变动</text>
  <text x="105" y="1005" class="tiny">两指标高相关 → 反向验证LLM评分入表前年份可靠性</text>

  <!-- M: 中间变量 -->
  <rect x="680" y="806" width="540" height="210" rx="10" class="box"/>
  <text x="950" y="842" text-anchor="middle" class="section">中间变量：资产配置</text>
  <line x1="705" y1="856" x2="1195" y2="856" class="rule"/>
  <text x="705" y="890" class="head">维度一：金融资产配置（脱虚向实）</text>
  <text x="705" y="920" class="small">交易性金融资产 / 投资性房地产占比</text>
  <text x="705" y="952" class="head">维度二：数据资产配置（结构转型）</text>
  <text x="705" y="982" class="small">数据资源入表 / IT与软件投入 / 研发中数据部分</text>

  <!-- Y: 因变量 -->
  <rect x="1260" y="806" width="560" height="210" rx="10" class="box"/>
  <text x="1540" y="842" text-anchor="middle" class="section">因变量：资本定价效率</text>
  <line x1="1285" y1="856" x2="1795" y2="856" class="rule"/>
  <text x="1285" y="890" class="head">主指标</text>
  <text x="1285" y="920" class="small">股价延迟 Hou &amp; Moskowitz (2005)</text>
  <text x="1285" y="952" class="head">稳健性替换</text>
  <text x="1285" y="982" class="small">股价同步性 / M/B分解 / Mispricing偏差</text>

  <!-- ============ Panel C: 实证主线 ============ -->
  <rect x="40" y="1070" width="1820" height="560" rx="10" class="panel"/>
  <text x="78" y="1112" class="panelTitle">Panel C. 实证主线：面板回归 + 投资组合回测</text>
  <line x1="60" y1="1126" x2="1840" y2="1126" class="rule"/>

  <!-- 面板回归 -->
  <rect x="80" y="1150" width="840" height="450" rx="10" class="box"/>
  <text x="500" y="1190" text-anchor="middle" class="section">主检验一：面板回归</text>
  <line x1="105" y1="1204" x2="895" y2="1204" class="rule"/>

  <text x="105" y="1240" class="head">基准回归</text>
  <text x="105" y="1272" class="small">面板固定效应（企业 + 年份）+ 行业-年份聚类标准误</text>
  <text x="105" y="1302" class="small">Y = 股价延迟 / 股价同步性；X = LLM数据要素利用指数</text>

  <text x="105" y="1342" class="head">因果识别</text>
  <text x="105" y="1374" class="small">DID：2024入表新规 x 数据要素利用强度（连续处理）</text>
  <text x="105" y="1404" class="small">IV：城市互联网基础设施水平 / 大数据交易所设立</text>

  <text x="105" y="1444" class="head">机制检验</text>
  <text x="105" y="1476" class="small">渠道一：资产配置结构变化（金融资产下降 + 数据资产上升）</text>
  <text x="105" y="1506" class="small">渠道二：信息环境改善（分析师覆盖增加 + 信息透明度提升）</text>

  <text x="105" y="1546" class="head">异质性分析</text>
  <text x="105" y="1576" class="small">产权性质 / 行业（数字经济 vs 传统）/ 信息环境 / 企业规模</text>

  <!-- 投资组合 -->
  <rect x="980" y="1150" width="840" height="450" rx="10" class="box"/>
  <text x="1400" y="1190" text-anchor="middle" class="section">主检验二：投资组合回测</text>
  <line x1="1005" y1="1204" x2="1795" y2="1204" class="rule"/>

  <text x="1005" y="1240" class="head">分组收益检验</text>
  <text x="1005" y="1272" class="small">每年6月按LLM评分五分组，计算7月至次年6月月度收益</text>
  <text x="1005" y="1302" class="small">Q5-Q1多空组合alpha：CAPM / FF3 / FF5 + 动量</text>
  <text x="1005" y="1332" class="small">alpha显著 → 市场未充分定价数据要素信息</text>

  <text x="1005" y="1372" class="head">数据要素因子（DAT）构建</text>
  <text x="1005" y="1404" class="small">DAT = Q5 - Q1月度收益序列</text>
  <text x="1005" y="1434" class="small">加入FF5检验增量解释力，GRS检验因子冗余性</text>
  <text x="1005" y="1464" class="small">对标Bongaerts et al. (2025) 无形资产因子</text>

  <text x="1005" y="1504" class="head">子期对比：制度效果检验</text>
  <text x="1005" y="1536" class="small">分别估计2010-2023和2024-2025两个子样本alpha</text>
  <text x="1005" y="1566" class="small">入表后alpha收窄 → 制度改善了数据要素的市场定价</text>

  <!-- ============ Panel D: 进一步分析 ============ -->
  <rect x="40" y="1660" width="1820" height="320" rx="10" class="panel"/>
  <text x="78" y="1702" class="panelTitle">Panel D. 进一步分析：因果可解释性（补充因果证据）</text>
  <line x1="60" y1="1716" x2="1840" y2="1716" class="rule"/>

  <text x="80" y="1750" class="small">定位：面板回归揭示相关性，DID提供因果识别，因果发现算法进一步验证因果方向并排除反向因果与遗漏路径</text>

  <rect x="80" y="1775" width="540" height="175" rx="10" class="box"/>
  <text x="350" y="1812" text-anchor="middle" class="head">因果发现：最小分离集算法</text>
  <line x1="105" y1="1826" x2="595" y2="1826" class="rule"/>
  <text x="105" y="1858" class="small">利用时序平稳性结构学习带时滞因果图</text>
  <text x="105" y="1888" class="small">验证 X→M→Y 因果路径是否被数据支持</text>
  <text x="105" y="1918" class="small">排除 Y→X 反向因果和未假设的传导路径</text>

  <rect x="680" y="1775" width="540" height="175" rx="10" class="box"/>
  <text x="950" y="1812" text-anchor="middle" class="head">SHAP分解：定价不足的维度识别</text>
  <line x1="705" y1="1826" x2="1195" y2="1826" class="rule"/>
  <text x="705" y="1858" class="small">分解数据要素各子维度的边际贡献</text>
  <text x="705" y="1888" class="small">数据采集能力 / 数据分析深度 / 数据商业化应用</text>
  <text x="705" y="1918" class="small">哪些维度被市场系统性低估</text>

  <rect x="1280" y="1775" width="540" height="175" rx="10" class="box"/>
  <text x="1550" y="1812" text-anchor="middle" class="head">反事实分析：量化经济幅度</text>
  <line x1="1305" y1="1826" x2="1795" y2="1826" class="rule"/>
  <text x="1305" y="1858" class="small">数据要素利用从P25提升至P75</text>
  <text x="1305" y="1888" class="small">定价效率改善多少个标准差</text>
  <text x="1305" y="1918" class="small">错误定价减少多少百分点</text>

  <!-- ============ Panel E: 稳健性 ============ -->
  <rect x="40" y="2010" width="1820" height="200" rx="10" class="panel"/>
  <text x="78" y="2052" class="panelTitle">Panel E. 稳健性检验</text>
  <line x1="60" y1="2066" x2="1840" y2="2066" class="rule"/>

  <rect x="80" y="2086" width="300" height="96" rx="8" class="soft"/>
  <text x="230" y="2122" text-anchor="middle" class="body">替换因变量</text>
  <text x="230" y="2154" text-anchor="middle" class="small">四种定价效率指标互换</text>

  <rect x="410" y="2086" width="300" height="96" rx="8" class="soft"/>
  <text x="560" y="2122" text-anchor="middle" class="body">替换自变量</text>
  <text x="560" y="2154" text-anchor="middle" class="small">TF-IDF / 关键词词频</text>

  <rect x="740" y="2086" width="300" height="96" rx="8" class="soft"/>
  <text x="890" y="2122" text-anchor="middle" class="body">LLM评分验证</text>
  <text x="890" y="2154" text-anchor="middle" class="small">人工标注Cohen's Kappa</text>

  <rect x="1070" y="2086" width="300" height="96" rx="8" class="soft"/>
  <text x="1220" y="2122" text-anchor="middle" class="body">安慰剂检验</text>
  <text x="1220" y="2154" text-anchor="middle" class="small">虚假政策年 / 并行排除</text>

  <rect x="1400" y="2086" width="420" height="96" rx="8" class="soft"/>
  <text x="1610" y="2122" text-anchor="middle" class="body">样本调整</text>
  <text x="1610" y="2154" text-anchor="middle" class="small">PSM匹配 / 子样本 / Heckman</text>

  <!-- ============ Panel F: 数据与样本 ============ -->
  <rect x="40" y="2240" width="1820" height="190" rx="10" class="panel"/>
  <text x="78" y="2282" class="panelTitle">Panel F. 数据来源与样本</text>
  <line x1="60" y1="2296" x2="1840" y2="2296" class="rule"/>

  <rect x="80" y="2316" width="540" height="88" rx="8" class="box"/>
  <text x="350" y="2350" text-anchor="middle" class="head">数据来源</text>
  <text x="105" y="2384" class="small">CSMAR + 巨潮资讯网年报全文 + 手工整理入表数据</text>

  <rect x="680" y="2316" width="540" height="88" rx="8" class="box"/>
  <text x="950" y="2350" text-anchor="middle" class="head">样本范围</text>
  <text x="705" y="2384" class="small">沪深A股非金融企业，2010-2025年</text>

  <rect x="1280" y="2316" width="540" height="88" rx="8" class="box"/>
  <text x="1550" y="2350" text-anchor="middle" class="head">分期设计</text>
  <text x="1305" y="2384" class="small">基准期2010-2023 / 政策冲击期2024-2025</text>

  <!-- ============ Panel G: 边际贡献 ============ -->
  <rect x="40" y="2460" width="1820" height="190" rx="10" class="panel"/>
  <text x="78" y="2502" class="panelTitle">Panel G. 预期边际贡献</text>
  <line x1="60" y1="2516" x2="1840" y2="2516" class="rule"/>

  <rect x="80" y="2536" width="560" height="86" rx="8" class="box"/>
  <text x="360" y="2568" text-anchor="middle" class="head">理论贡献</text>
  <text x="105" y="2600" class="small">信息模糊 vs 信息供给竞争框架；数据要素作为独立定价维度</text>

  <rect x="670" y="2536" width="560" height="86" rx="8" class="box"/>
  <text x="950" y="2568" text-anchor="middle" class="head">方法贡献</text>
  <text x="695" y="2600" class="small">LLM双重确认度量；DAT因子构建；因果发现补充验证</text>

  <rect x="1260" y="2536" width="560" height="86" rx="8" class="box"/>
  <text x="1540" y="2568" text-anchor="middle" class="head">政策贡献</text>
  <text x="1285" y="2600" class="small">评估入表制度定价效率改善效果；数据要素市场化配置证据</text>

</svg>
