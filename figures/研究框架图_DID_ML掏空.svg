<rect x="40" y="728" width="1120" height="28" fill="#d0d0d0" stroke="#000" stroke-width="1.5"/>
<text x="600" y="748" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">机制检验（Mechanism Tests）</text>

<rect x="60" y="768" width="330" height="44" stroke="#000" stroke-width="1" fill="#fff"/>
<text x="225" y="786" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">渠道一：信息透明度</text>
