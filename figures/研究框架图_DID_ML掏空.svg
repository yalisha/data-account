<!-- 第三层：SHAP可解释性分析               -->
<!-- ═══════════════════════════════════════ -->
<rect x="40" y="544" width="1120" height="154" stroke="#000" stroke-width="1.5" fill="#fff"/>
<rect x="40" y="544" width="1120" height="28" fill="#d0d0d0" stroke="#000" stroke-width="1.5"/>
<text x="600" y="564" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">SHAP可解释性分析（方法论贡献③）</text>

<!-- SHAP四维度 -->
<rect x="58" y="584" width="245" height="100" stroke="#000" stroke-width="1" fill="#fff"/>
<text x="181" y="602" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">全局特征重要性</text>
<line x1="68" y1="608" x2="293" y2="608" stroke="#000" stroke-width="0.5"/>
<text x="68" y="624" font-size="9.5" fill="#333">四类特征（NLP/财务/治理/区域）</text>
<text x="68" y="640" font-size="9.5" fill="#333">重要性排名与贡献度</text>
<text x="68" y="656" font-size="9.5" fill="#333">SHAP Summary Plot</text>
<text x="68" y="676" font-size="9" fill="#000" font-weight="bold">→ 数据要素特征排第几？</text>

<rect x="318" y="584" width="245" height="100" stroke="#000" stroke-width="1" fill="#fff"/>
<text x="441" y="602" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">特征交互效应</text>
<line x1="328" y1="608" x2="553" y2="608" stroke="#000" stroke-width="0.5"/>
<text x="328" y="624" font-size="9.5" fill="#333">Lnda × 两权分离度</text>
<text x="328" y="640" font-size="9.5" fill="#333">Lnda × 股权集中度</text>
<text x="328" y="656" font-size="9.5" fill="#333">SHAP Dependence Plot</text>
<text x="328" y="676" font-size="9" fill="#000" font-weight="bold">→ 何时数据治理最有效？</text>

<rect x="578" y="584" width="245" height="100" stroke="#000" stroke-width="1" fill="#fff"/>
<text x="701" y="602" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">典型案例分析</text>
<line x1="588" y1="608" x2="813" y2="608" stroke="#000" stroke-width="0.5"/>
<text x="588" y="624" font-size="9.5" fill="#333">选取典型掏空企业</text>
<text x="588" y="640" font-size="9.5" fill="#333">SHAP Waterfall Plot</text>
<text x="588" y="656" font-size="9.5" fill="#333">逐因素分解预测逻辑</text>
<text x="588" y="676" font-size="9" fill="#000" font-weight="bold">→ 为什么预测它掏空？</text>

<rect x="838" y="584" width="305" height="100" stroke="#000" stroke-width="1" fill="#fff"/>
<text x="991" y="602" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">消融实验（Ablation）</text>
<line x1="848" y1="608" x2="1133" y2="608" stroke="#000" stroke-width="0.5"/>
<text x="848" y="624" font-size="9.5" fill="#333">去除NLP特征 → AUC变化</text>
<text x="848" y="640" font-size="9.5" fill="#333">去除治理特征 → AUC变化</text>
<text x="848" y="656" font-size="9.5" fill="#333">去除财务特征 → AUC变化</text>
<text x="848" y="676" font-size="9" fill="#000" font-weight="bold">→ 各类特征的增量预测贡献</text>

