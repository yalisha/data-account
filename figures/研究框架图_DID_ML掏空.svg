<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1150" font-family="'SimSun','STSong','Songti SC','Noto Serif CJK SC','Microsoft YaHei',serif">
<defs>
  <marker id="ad" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto"><polygon points="0 0,8 0,4 6" fill="#000"/></marker>
  <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#000"/></marker>
  <marker id="al" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><polygon points="8 0,0 3,8 6" fill="#000"/></marker>
</defs>

<rect width="1200" height="1150" fill="#fff"/>

<!-- ═══════ 标题 ═══════ -->
<text x="600" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#000">数据要素利用与大股东掏空行为：基于可解释机器学习的预测与识别</text>
<text x="600" y="56" text-anchor="middle" font-size="10.5" fill="#555" font-style="italic">Data Element Utilization and Controlling Shareholder Tunneling: Prediction and Identification via Explainable ML</text>

<!-- ═══════════════════════════════════════ -->
<!-- 第一层：变量构建（左X 右Y）            -->
<!-- ═══════════════════════════════════════ -->
<text x="600" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">—— 变量构建 ——</text>
<line x1="480" y1="88" x2="720" y2="88" stroke="#000" stroke-width="0.6"/>

<!-- 左：自变量X -->
<rect x="40" y="100" width="500" height="168" stroke="#000" stroke-width="1.5" fill="#fff"/>
<rect x="40" y="100" width="500" height="26" fill="#e0e0e0" stroke="#000" stroke-width="1.5"/>
<text x="290" y="118" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#000">自变量 X：数据要素利用强度（Lnda）</text>

<text x="58" y="146" font-size="10.5" fill="#000" font-weight="bold">构建方法：Word2Vec（CBOW）</text>
<text x="58" y="164" font-size="10" fill="#333">① 种子词表：数据资产、数据治理、数据交易、数据平台……</text>
<text x="58" y="180" font-size="10" fill="#333">② 训练语料：全部A股年报 MD&amp;A 章节</text>
<text x="58" y="196" font-size="10" fill="#333">③ 语义相似度 ≥ 0.5 扩展词表 → 词频统计 → 取对数</text>
<text x="58" y="216" font-size="10" fill="#000" font-weight="bold">参考：朱康（2025）《会计研究》</text>
<text x="58" y="234" font-size="10" fill="#333">▸ 方法论贡献①：NLP文本挖掘构建核心自变量</text>
<text x="58" y="254" font-size="9" fill="#666" font-style="italic">数据来源：巨潮资讯网（年报全文）</text>

<!-- 右：因变量Y -->
<rect x="600" y="100" width="560" height="168" stroke="#000" stroke-width="1.5" fill="#fff"/>
<rect x="600" y="100" width="560" height="26" fill="#e0e0e0" stroke="#000" stroke-width="1.5"/>
<text x="880" y="118" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#000">因变量 Y：大股东掏空风险综合得分</text>

<text x="618" y="146" font-size="10.5" fill="#000" font-weight="bold">构建方法：XGBoost 多维度预测模型</text>
<text x="618" y="164" font-size="10" fill="#333">输入特征：财务异常指标（OREC、关联交易、担保）</text>
<text x="618" y="180" font-size="10" fill="#333">　　　　　+ 治理结构（两权分离、股权集中度）</text>
<text x="618" y="196" font-size="10" fill="#333">　　　　　+ 文本特征（关联交易披露详细度）</text>
<text x="618" y="216" font-size="10" fill="#333">训练标签：CSRC处罚（资金占用/关联违规）→ Y=1</text>
<text x="618" y="234" font-size="10" fill="#333">▸ 方法论贡献②：ML构建综合掏空风险度量</text>
<text x="618" y="254" font-size="9" fill="#666" font-style="italic">数据来源：CSMAR（财务+治理+违规处罚+关联交易）</text>

<!-- X→Y 连接箭头 -->
<line x1="540" y1="184" x2="600" y2="184" stroke="#000" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="570" y="178" text-anchor="middle" font-size="9" fill="#000">预测</text>

<!-- ═══════════════════════════════════════ -->
<!-- 向下箭头                                -->
<!-- ═══════════════════════════════════════ -->
<line x1="290" y1="268" x2="290" y2="306" stroke="#000" stroke-width="1.2" marker-end="url(#ad)"/>
<line x1="880" y1="268" x2="880" y2="306" stroke="#000" stroke-width="1.2" marker-end="url(#ad)"/>

<!-- ═══════════════════════════════════════ -->
<!-- 第二层：DID因果识别（主框架）           -->
<!-- ═══════════════════════════════════════ -->
<rect x="40" y="308" width="1120" height="180" stroke="#000" stroke-width="2" fill="#fff"/>
<rect x="40" y="308" width="1120" height="28" fill="#d0d0d0" stroke="#000" stroke-width="2"/>
<text x="600" y="328" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">主体框架：多时点双重差分法（Staggered DID）</text>

<!-- 左：政策冲击 -->
<rect x="60" y="348" width="320" height="126" stroke="#000" stroke-width="1" fill="#fff"/>
<rect x="60" y="348" width="320" height="24" fill="#ebebeb" stroke="#000" stroke-width="1"/>
<text x="220" y="366" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">政策冲击（Exogenous Shock）</text>
<text x="76" y="392" font-size="10" fill="#333">数据交易所分批设立（2021—2024）</text>
<text x="76" y="410" font-size="10" fill="#333">全国约30家，时间错开 → 多时点DID</text>
<text x="76" y="430" font-size="10" fill="#000" font-weight="bold">处理强度：</text>
<text x="76" y="448" font-size="10" fill="#333">NPP-VIIRS夜光辐射变化率（连续处理）</text>
<text x="76" y="466" font-size="9" fill="#666" font-style="italic">数据来源：EOG夜光遥感（免费）+ 手工收集</text>

<!-- 中：识别策略 -->
<rect x="400" y="348" width="340" height="126" stroke="#000" stroke-width="1" fill="#fff"/>
<rect x="400" y="348" width="340" height="24" fill="#ebebeb" stroke="#000" stroke-width="1"/>
<text x="570" y="366" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">识别策略与估计量</text>
<text x="416" y="392" font-size="10" fill="#333">估计量：Callaway &amp; Sant'Anna (2021)</text>
<text x="416" y="410" font-size="10" fill="#333">→ 避免异质性处理效应偏误</text>
<text x="416" y="434" font-size="10" fill="#000" font-weight="bold">主回归模型：</text>
<text x="416" y="452" font-size="10" fill="#333">Y_it = α + β·Treat_it + γ·X_it + μ_i + δ_t + ε_it</text>
<text x="416" y="468" font-size="10" fill="#333">β &lt; 0 → 数据交易所设立降低掏空风险</text>

<!-- 右：有效性检验 -->
<rect x="760" y="348" width="380" height="126" stroke="#000" stroke-width="1" fill="#fff"/>
<rect x="760" y="348" width="380" height="24" fill="#ebebeb" stroke="#000" stroke-width="1"/>
<text x="950" y="366" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">DID有效性检验</text>
<text x="776" y="392" font-size="10" fill="#333">① 平行趋势检验（Event Study Plot）</text>
<text x="776" y="410" font-size="10" fill="#333">② 安慰剂检验（随机化处理时间×500次）</text>
<text x="776" y="428" font-size="10" fill="#333">③ 排除预期效应（剔除政策前1年样本）</text>
<text x="776" y="446" font-size="10" fill="#333">④ PSM-DID（倾向得分匹配）</text>
<text x="776" y="464" font-size="10" fill="#333">⑤ 替换Y：OREC原始值 / CSRC处罚哑变量</text>

<!-- 因果逻辑链标注 -->
<rect x="200" y="490" width="760" height="24" stroke="#000" stroke-width="1.2" fill="#f5f5f5"/>
<text x="580" y="507" text-anchor="middle" font-size="10.5" fill="#000" font-weight="bold">因果链：数据交易所设立 → 企业数据要素利用↑ → 信息透明度↑ → 掏空成本↑ → 掏空行为↓</text>

