<rect x="740" y="612" width="430" height="176" rx="0" fill="#fff" stroke="#000" stroke-width="1.5"/>
<rect x="740" y="612" width="430" height="26" rx="0" fill="#d0d0d0" stroke="#000" stroke-width="1.5"/>
