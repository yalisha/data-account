<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1080" font-family="'SimSun','STSong','Songti SC','Noto Serif CJK SC','Microsoft YaHei',serif">
<defs>
  <marker id="arrowDown" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto"><polygon points="0 0,8 0,4 6" fill="#000"/></marker>
  <marker id="arrowRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#000"/></marker>
  <marker id="arrowLeft" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><polygon points="8 0,0 3,8 6" fill="#000"/></marker>
</defs>

<!-- 背景 -->
<rect width="1200" height="1080" fill="#fff"/>

<!-- ═══════ 标题 ═══════ -->
<text x="600" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#000">数据要素利用与大股东掏空行为：基于可解释机器学习的预测与识别</text>
<text x="600" y="60" text-anchor="middle" font-size="11" fill="#555" font-style="italic">Data Element Utilization and Controlling Shareholder Tunneling: Prediction and Identification via Explainable ML</text>

<!-- ═══════ 阶段一：多源特征工程 ═══════ -->
<rect x="30" y="80" width="1140" height="210" rx="0" fill="#fff" stroke="#000" stroke-width="1.5"/>
<text x="600" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">阶段一：多源特征工程（Feature Engineering）</text>
<line x1="200" y1="106" x2="1000" y2="106" stroke="#000" stroke-width="0.8"/>

<!-- 四个特征方框 -->
<!-- 卡1: NLP数据要素特征 -->
<rect x="48" y="118" width="255" height="160" rx="0" fill="#fff" stroke="#000" stroke-width="1"/>
<rect x="48" y="118" width="255" height="24" rx="0" fill="#e8e8e8" stroke="#000" stroke-width="1"/>
<text x="176" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">NLP特征（年报文本提取）</text>
<text x="60" y="160" font-size="10" fill="#000" font-weight="bold">数据要素利用强度 Lnda</text>
<text x="60" y="176" font-size="9.5" fill="#333">  Word2Vec + MD&amp;A语义相似度</text>
<text x="60" y="194" font-size="10" fill="#000" font-weight="bold">信息披露文本质量</text>
<text x="60" y="210" font-size="9.5" fill="#333">  可读性 · 模糊语言占比 · 语气操纵</text>
<text x="60" y="228" font-size="10" fill="#000" font-weight="bold">关联交易叙述特征</text>
<text x="60" y="244" font-size="9.5" fill="#333">  关联交易披露详细度 · 异常表述</text>
<text x="60" y="266" font-size="9" fill="#666" font-style="italic">~8个特征</text>

<!-- 卡2: 财务特征 -->
<rect x="323" y="118" width="255" height="160" rx="0" fill="#fff" stroke="#000" stroke-width="1"/>
<rect x="323" y="118" width="255" height="24" rx="0" fill="#e8e8e8" stroke="#000" stroke-width="1"/>
<text x="451" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">财务特征（CSMAR报表）</text>
<text x="335" y="160" font-size="9.5" fill="#333">其他应收款/总资产（OREC）</text>
<text x="335" y="176" font-size="9.5" fill="#333">关联交易总额/总资产</text>
<text x="335" y="192" font-size="9.5" fill="#333">关联担保金额/净资产</text>
<text x="335" y="208" font-size="9.5" fill="#333">ROA · 资产负债率 · 营收增长率</text>
<text x="335" y="224" font-size="9.5" fill="#333">经营现金流 · 应计项目 · Tobin's Q</text>
<text x="335" y="266" font-size="9" fill="#666" font-style="italic">~15个特征</text>

<!-- 卡3: 治理特征 -->
<rect x="598" y="118" width="255" height="160" rx="0" fill="#fff" stroke="#000" stroke-width="1"/>
<rect x="598" y="118" width="255" height="24" rx="0" fill="#e8e8e8" stroke="#000" stroke-width="1"/>
<text x="726" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">治理特征（CSMAR治理库）</text>
<text x="610" y="160" font-size="9.5" fill="#333">第一大股东持股比例</text>
<text x="610" y="176" font-size="9.5" fill="#333">控制权-现金流权分离度（Wedge）</text>
<text x="610" y="192" font-size="9.5" fill="#333">股权制衡度（第2-5 / 第1）</text>
<text x="610" y="208" font-size="9.5" fill="#333">独董比例 · 两职合一 · 董事会规模</text>
<text x="610" y="224" font-size="9.5" fill="#333">机构持股 · 审计质量 · 分析师关注</text>
<text x="610" y="266" font-size="9" fill="#666" font-style="italic">~12个特征</text>

<!-- 卡4: 区域特征 -->
<rect x="873" y="118" width="280" height="160" rx="0" fill="#fff" stroke="#000" stroke-width="1"/>
<rect x="873" y="118" width="280" height="24" rx="0" fill="#e8e8e8" stroke="#000" stroke-width="1"/>
<text x="1013" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">区域特征（遥感+公开数据）</text>
<text x="885" y="160" font-size="9.5" fill="#333">NPP-VIIRS夜间灯光辐射值</text>
<text x="885" y="176" font-size="9.5" fill="#333">北大数字普惠金融指数</text>
<text x="885" y="192" font-size="9.5" fill="#333">数据交易所设立（0/1）</text>
<text x="885" y="208" font-size="9.5" fill="#333">城市互联网普及率</text>
<text x="885" y="224" font-size="9.5" fill="#333">市场化指数（樊纲）</text>
<text x="885" y="266" font-size="9" fill="#666" font-style="italic">~5个特征 | EOG · 北大 · 手工</text>

<!-- 特征总计标注 -->
<text x="600" y="285" text-anchor="middle" font-size="9.5" fill="#666">合计约 40–50 个特征 → 输入机器学习模型</text>

<!-- 向下箭头: 阶段一 → 阶段二 -->
<line x1="600" y1="290" x2="600" y2="318" stroke="#000" stroke-width="1.2" marker-end="url(#arrowDown)"/>

<!-- ═══════ 阶段二：预测目标 ═══════ -->
<rect x="280" y="320" width="640" height="80" rx="0" fill="#fff" stroke="#000" stroke-width="1.5"/>
<rect x="280" y="320" width="640" height="26" rx="0" fill="#d0d0d0" stroke="#000" stroke-width="1.5"/>
<text x="600" y="339" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">预测目标 Y：大股东掏空（Tunneling）</text>

<text x="300" y="366" font-size="10" fill="#000" font-weight="bold">主标签：</text>
<text x="358" y="366" font-size="10" fill="#333">OREC &gt; 行业-年度中位数 → Y=1（高掏空风险）</text>
<text x="300" y="384" font-size="10" fill="#000" font-weight="bold">稳健标签：</text>
<text x="372" y="384" font-size="10" fill="#333">CSRC处罚（资金占用/关联违规）→ Y=1  |  异常OREC残差法 → Y=1</text>

<!-- 向下箭头: 阶段二 → 阶段三 -->
<line x1="600" y1="400" x2="600" y2="428" stroke="#000" stroke-width="1.2" marker-end="url(#arrowDown)"/>

<!-- ═══════ 阶段三：模型训练与对比 ═══════ -->
<rect x="100" y="430" width="1000" height="128" rx="0" fill="#fff" stroke="#000" stroke-width="1.5"/>
<rect x="100" y="430" width="1000" height="26" rx="0" fill="#d0d0d0" stroke="#000" stroke-width="1.5"/>
<text x="600" y="449" text-anchor="middle" font-size="13" font-weight="bold" fill="#000">阶段三：模型训练与性能对比</text>

<!-- 4个模型方框 -->
<rect x="125" y="468" width="185" height="72" rx="0" fill="#fff" stroke="#000" stroke-width="1"/>
<text x="218" y="488" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Logistic Regression</text>
<text x="218" y="504" text-anchor="middle" font-size="10" fill="#333">基线模型（Baseline）</text>
<text x="218" y="520" text-anchor="middle" font-size="9" fill="#666">传统方法对照组</text>

<rect x="330" y="468" width="185" height="72" rx="0" fill="#fff" stroke="#000" stroke-width="1"/>
<text x="423" y="488" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Random Forest</text>
<text x="423" y="504" text-anchor="middle" font-size="10" fill="#333">集成学习（Bagging）</text>
<text x="423" y="520" text-anchor="middle" font-size="9" fill="#666">特征重要性基准</text>

<rect x="535" y="468" width="185" height="72" rx="0" fill="#f0f0f0" stroke="#000" stroke-width="2"/>
<text x="628" y="488" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">XGBoost / LightGBM</text>
<text x="628" y="504" text-anchor="middle" font-size="10" fill="#333">集成学习（Boosting）</text>
<text x="628" y="520" text-anchor="middle" font-size="9" fill="#000" font-weight="bold">预期最优模型 ★</text>

<rect x="740" y="468" width="185" height="72" rx="0" fill="#fff" stroke="#000" stroke-width="1"/>
<text x="833" y="488" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">MLP / Neural Net</text>
<text x="833" y="504" text-anchor="middle" font-size="10" fill="#333">深度学习（可选）</text>
<text x="833" y="520" text-anchor="middle" font-size="9" fill="#666">非线性边界探索</text>

<!-- 验证策略标注 -->
<text x="960" y="478" font-size="9.5" fill="#000" font-weight="bold">验证策略</text>
<line x1="960" y1="482" x2="1070" y2="482" stroke="#000" stroke-width="0.5"/>
<text x="960" y="496" font-size="9" fill="#333">时间序列分割</text>
<text x="960" y="510" font-size="9" fill="#333">2015–2019 训练</text>
<text x="960" y="524" font-size="9" fill="#333">2020–2023 测试</text>
<text x="960" y="540" font-size="9" fill="#000" font-weight="bold">指标：AUC · F1 · PR</text>

<!-- 核心发现标注 -->
<rect x="350" y="560" width="500" height="22" rx="0" fill="#fff" stroke="#000" stroke-width="1" stroke-dasharray="4,2"/>
<text x="600" y="576" text-anchor="middle" font-size="10" fill="#000" font-weight="bold">核心发现：加入数据要素NLP特征后 AUC 显著提升 → 增量预测力</text>

